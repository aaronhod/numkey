name: CI

on:
  push:
    branches: [claude/capacitor-app]
  pull_request:
  workflow_dispatch:

# Dummy Clerk keys (valid format, not real) so the app boots for build/e2e.
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
  CLERK_SECRET_KEY: sk_test_dummydummydummydummydummydummydummydummy
  SKIP_ENV_VALIDATION: "1"
  # If the runner sets an HTTP(S) proxy, Chromium honors it (Node does not),
  # so it routes even 127.0.0.1 through the proxy and fails with
  # ERR_NAME_NOT_RESOLVED. Force loopback to bypass any proxy.
  NO_PROXY: "localhost,127.0.0.1,::1"
  no_proxy: "localhost,127.0.0.1,::1"

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Unit tests (Vitest)
        run: bun run test:unit

  e2e:
    name: Build, typecheck, lint & e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mathgame
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mathgame
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Push database schema
        run: bunx prisma db push
      - name: Seed database
        run: bunx tsx prisma/seed_problems.ts
      # `next build` also generates next-env.d.ts, which typecheck/lint need.
      - name: Build
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Debug proxy env
        run: |
          echo "proxy-related env vars:"
          env | grep -iE 'proxy' || echo "(none set)"
      - name: Playwright e2e tests
        run: bun run test:e2e
